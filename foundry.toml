[profile.default]
src     = "src"
out     = "out"
libs    = ["lib"]
solc    = "0.8.26"
via_ir  = true
optimizer = true
optimizer_runs = 200

remappings = [
  "v4-core/=lib/v4-core/",
  "v4-periphery/=lib/v4-periphery/",
  "forge-std/=lib/forge-std/src/",
  "solmate/=lib/v4-core/lib/solmate/",
  "@openzeppelin/=lib/v4-core/lib/openzeppelin-contracts/",
]

[profile.default.fuzz]
runs = 256
